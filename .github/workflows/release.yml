name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            local goos="$1"
            local goarch="$2"
            local ext="${3:-}"
            local output="dist/rutebayar-${goos}-${goarch}${ext}"

            echo "Building ${output}"
            GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags "-s -w -X github.com/pendig/rute-bayar/internal/build.Version=${VERSION}" \
              -o "${output}" \
              ./cmd/rute-bayar
          }

          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64 .exe

          (cd dist && sha256sum rutebayar-* > checksums.txt)

      - name: Prepare release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          awk -v version="$VERSION" '
            $0 ~ "^## " version && !found {
              found = 1
              print
              next
            }
            found && /^## / {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            {
              echo "## ${VERSION}"
              echo
              echo "### Highlights"
              echo "- CLI command rename and docs alignment to \`rutebayar\`."
              echo "- Release workflow + CI/CD improvements to reduce post-release friction."
              echo
              echo "### Verification"
              echo "- \`go test ./...\`"
            } > release-notes.md
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          prerelease_args=()
          case "${VERSION}" in
            *-alpha*|*-beta*|*-rc*) prerelease_args+=(--prerelease) ;;
          esac

          gh release create "${VERSION}" \
            dist/rutebayar-linux-amd64 \
            dist/rutebayar-linux-arm64 \
            dist/rutebayar-darwin-amd64 \
            dist/rutebayar-darwin-arm64 \
            dist/rutebayar-windows-amd64.exe \
            dist/checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            "${prerelease_args[@]}"
