name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          build() {
            local goos="$1"
            local goarch="$2"
            local ext="${3:-}"
            local output="dist/rutebayar-${goos}-${goarch}${ext}"

            echo "Building ${output}"
            GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags "-s -w -X github.com/pendig/rute-bayar/internal/build.Version=${VERSION}" \
              -o "${output}" \
              ./cmd/rute-bayar
          }

          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64 .exe

          (cd dist && sha256sum rutebayar-* > checksums.txt)

      - name: Prepare release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          awk -v version="$VERSION" '
            $0 ~ "^## " version && !found {
              found = 1
              print
              next
            }
            found && /^## / {
              exit
            }
            found {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            {
              echo "## ${VERSION}"
              echo
              echo "### Highlights"
              echo "- CLI command rename and docs alignment to \`rutebayar\`."
              echo "- Release workflow + CI/CD improvements to reduce post-release friction."
              echo
              echo "### Verification"
              echo "- \`go test ./...\`"
            } > release-notes.md
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          prerelease_args=()
          case "${VERSION}" in
            *-alpha*|*-beta*|*-rc*) prerelease_args+=(--prerelease) ;;
          esac

          gh release create "${VERSION}" \
            dist/rutebayar-linux-amd64 \
            dist/rutebayar-linux-arm64 \
            dist/rutebayar-darwin-amd64 \
            dist/rutebayar-darwin-arm64 \
            dist/rutebayar-windows-amd64.exe \
            dist/checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            "${prerelease_args[@]}"

      - name: Sync Homebrew tap
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: pendig/homebrew-tap
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not configured. Skipping Homebrew sync."
            exit 0
          fi

          export GH_TOKEN="${HOMEBREW_TAP_TOKEN}"

          darwin_amd64_sha="$(awk '$2=="rutebayar-darwin-amd64"{print $1}' dist/checksums.txt)"
          darwin_arm64_sha="$(awk '$2=="rutebayar-darwin-arm64"{print $1}' dist/checksums.txt)"
          linux_amd64_sha="$(awk '$2=="rutebayar-linux-amd64"{print $1}' dist/checksums.txt)"
          linux_arm64_sha="$(awk '$2=="rutebayar-linux-arm64"{print $1}' dist/checksums.txt)"

          if [[ -z "${darwin_amd64_sha}" || -z "${darwin_arm64_sha}" || -z "${linux_amd64_sha}" || -z "${linux_arm64_sha}" ]]; then
            echo "Missing checksum for expected release assets. Cannot sync Homebrew."
            exit 1
          fi

          version_without_v="${VERSION#v}"
          branch="chore/rute-bayar-${VERSION}"
          tap_dir="$(mktemp -d)"
          trap 'rm -rf "${tap_dir}"' EXIT

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "${tap_dir}/tap"
          cd "${tap_dir}/tap"
          mkdir -p Formula

          {
            echo "class RuteBayar < Formula"
            echo "  desc \"Payment router CLI and webhook daemon for Indonesian payment gateways\""
            echo "  homepage \"https://github.com/${GITHUB_REPOSITORY_NAME}\""
            echo "  version \"${version_without_v}\""
            echo "  license \"MIT\""
            echo ""
            echo "  on_macos do"
            echo "    if Hardware::CPU.arm?"
            echo "      url \"https://github.com/${GITHUB_REPOSITORY_NAME}/releases/download/${VERSION}/rutebayar-darwin-arm64\""
            echo "      sha256 \"${darwin_arm64_sha}\""
            echo "    else"
            echo "      url \"https://github.com/${GITHUB_REPOSITORY_NAME}/releases/download/${VERSION}/rutebayar-darwin-amd64\""
            echo "      sha256 \"${darwin_amd64_sha}\""
            echo "    end"
            echo "  end"
            echo ""
            echo "  on_linux do"
            echo "    if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?"
            echo "      url \"https://github.com/${GITHUB_REPOSITORY_NAME}/releases/download/${VERSION}/rutebayar-linux-arm64\""
            echo "      sha256 \"${linux_arm64_sha}\""
            echo "    else"
            echo "      url \"https://github.com/${GITHUB_REPOSITORY_NAME}/releases/download/${VERSION}/rutebayar-linux-amd64\""
            echo "      sha256 \"${linux_amd64_sha}\""
            echo "    end"
            echo "  end"
            echo ""
            echo "  def install"
            echo "    bin.install Dir[\"rutebayar-*\"].first => \"rutebayar\""
            echo "  end"
            echo ""
            echo "  test do"
            echo "    system bin/\"rutebayar\", \"version\""
            echo "  end"
            echo "end"
          } > Formula/rute-bayar.rb

          if git diff --quiet -- Formula/rute-bayar.rb; then
            echo "No Homebrew formula changes for ${VERSION}"
            exit 0
          fi

          if git show-ref --verify --quiet "refs/remotes/origin/${branch}"; then
            git checkout "${branch}"
            git pull --rebase origin "${branch}"
          else
            git checkout -b "${branch}"
          fi

          git add Formula/rute-bayar.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump rute-bayar to ${VERSION}"
            git push "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "${branch}"
          fi

          existing_pr="$(gh pr list --repo "${HOMEBREW_TAP_REPO}" --state open --head "${branch}" --json number --limit 1 -q '.[0].number')"
          if [[ -n "${existing_pr}" ]]; then
            echo "Open Homebrew PR already exists: #${existing_pr}"
            exit 0
          fi

          {
            echo "Automated Homebrew update for release ${VERSION}."
            echo ""
            echo "- Bump formula version to ${version_without_v}"
            echo "- Update darwin/linux binary URLs and SHA256 checksums"
            echo "- Keeps install command as \`rutebayar\`"
          } > "${tap_dir}/chore-body.md"

          gh pr create \
            --repo "${HOMEBREW_TAP_REPO}" \
            --base main \
            --head "${branch}" \
            --title "chore: bump rute-bayar to ${VERSION}" \
            --body-file "${tap_dir}/chore-body.md"
