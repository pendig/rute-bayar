name: Bug report
description: Report a reproducible problem in Rute Bayar.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Rute Bayar. Please remove secrets, tokens, customer data, and raw payloads that may contain sensitive information.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0-alpha.3 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Xendit
        - Midtrans
        - Webhook forwarding
        - Storage/SQLite
        - CLI
        - Other
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - sandbox
        - production
        - local only
        - not applicable
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands and sanitized input.
      placeholder: |
        1. Run ...
        2. Send ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or output
      render: text
