name: Feature request
description: Suggest an improvement or new provider capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. For provider-specific features, please include links to official provider documentation.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or operational pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Provider or area
      placeholder: Midtrans, Xendit, forwarding, storage, CLI
  - type: textarea
    id: docs
    attributes:
      label: Official documentation
      description: Add official provider or API documentation links where relevant.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
